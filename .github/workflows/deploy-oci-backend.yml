name: Deploy OCI Backend

on:
  workflow_run:
    workflows:
      - Build Backend Image (GHCR)
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-oci-backend
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: SSH 키 로드
        env:
          OCI_SSH_KEY: ${{ secrets.OCI_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$OCI_SSH_KEY" | tr -d '\r' > ~/.ssh/oci_deploy_key
          chmod 600 ~/.ssh/oci_deploy_key

      - name: known_hosts 등록
        env:
          OCI_HOST: ${{ secrets.OCI_HOST }}
          OCI_SSH_PORT: ${{ secrets.OCI_SSH_PORT }}
        run: |
          set -euo pipefail
          SSH_PORT="${OCI_SSH_PORT:-22}"
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" -H "$OCI_HOST" >> ~/.ssh/known_hosts

      - name: OCI 배포 실행 (pull + no-build + health)
        env:
          OCI_HOST: ${{ secrets.OCI_HOST }}
          OCI_USER: ${{ secrets.OCI_USER }}
          OCI_SSH_PORT: ${{ secrets.OCI_SSH_PORT }}
          OCI_DEPLOY_PATH: ${{ secrets.OCI_DEPLOY_PATH }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          BACKEND_IMAGE: ghcr.io/ohseonghyeon/mocktalkback:prod-latest
        run: |
          set -euo pipefail
          SSH_PORT="${OCI_SSH_PORT:-22}"
          DEPLOY_PATH="${OCI_DEPLOY_PATH:-~/mocktalkback}"

          ssh -i ~/.ssh/oci_deploy_key -o IdentitiesOnly=yes -p "$SSH_PORT" "${OCI_USER}@${OCI_HOST}" bash -s <<EOF
          set -euo pipefail
          cd "$DEPLOY_PATH"
          export BACKEND_IMAGE="$BACKEND_IMAGE"

          print_diagnostics() {
            echo "=== deploy diagnostics begin ==="
            df -h || true
            df -i || true
            docker system df || true
            docker ps -a --format 'table {{.Names}}\t{{.Status}}\t{{.Image}}\t{{.Ports}}' || true
            docker images --digests --format 'table {{.Repository}}\t{{.Tag}}\t{{.Digest}}\t{{.Size}}' | head -n 20 || true
            echo "=== deploy diagnostics end ==="
          }

          restart_docker_daemon() {
            if command -v sudo >/dev/null 2>&1; then
              sudo systemctl restart docker || true
              return
            fi
            if command -v systemctl >/dev/null 2>&1; then
              systemctl restart docker || true
              return
            fi
            echo "docker daemon restart skipped: sudo/systemctl not available"
          }

          pull_with_retry() {
            local service="\$1"

            if docker compose -f docker-compose.oci-deploy.yml pull "\$service"; then
              return 0
            fi

            echo "initial pull failed for service=\$service"
            print_diagnostics
            docker image prune -af || true
            restart_docker_daemon
            sleep 3
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            docker network create mocktalk-internal >/dev/null 2>&1 || true

            if docker compose -f docker-compose.oci-deploy.yml pull "\$service"; then
              return 0
            fi

            echo "retry pull failed for service=\$service"
            print_diagnostics
            return 1
          }

          up_backend() {
            if docker compose -f docker-compose.oci-deploy.yml up -d --no-build backend; then
              return 0
            fi

            echo "docker compose up failed for backend"
            print_diagnostics
            docker compose -f docker-compose.oci-deploy.yml ps || true
            docker logs --tail 200 mocktalk-back || true
            return 1
          }

          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          docker network create mocktalk-internal >/dev/null 2>&1 || true
          pull_with_retry backend
          up_backend

          CODE=""
          for i in {1..150}; do
            CODE=\$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8082/api/health || true)
            echo "health check try=\$i code=\$CODE"
            if [ "\$CODE" = "200" ]; then
              break
            fi
            sleep 2
          done

          if [ "\$CODE" != "200" ]; then
            echo "health check failed: status=\$CODE"
            print_diagnostics
            docker compose -f docker-compose.oci-deploy.yml ps || true
            docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'
            docker logs --tail 200 mocktalk-back || true
            exit 1
          fi

          docker image prune -f
          EOF

      - name: 배포 완료 요약
        run: |
          echo "OCI 백엔드 배포 완료: ghcr.io/ohseonghyeon/mocktalkback:prod-latest" >> "$GITHUB_STEP_SUMMARY"

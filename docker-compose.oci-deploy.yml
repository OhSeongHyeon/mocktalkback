services:
  # OCI 서버는 GHCR 이미지를 pull 해서 백엔드만 배포한다.
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/ohseonghyeon/mocktalkback:prod-latest}
    pull_policy: always
    container_name: mocktalk-back
    env_file:
      - ./.env.prod
    # 앱/매트릭 포트는 로컬 루프백으로만 바인딩한다.
    # 외부 공개는 경유를 전제로 한다.
    ports:
      - "127.0.0.1:8082:8082"
      - "127.0.0.1:8083:8083"
    # 프론트와 내부 통신할 공통 네트워크에 backend 별칭으로 연결한다.
    networks:
      mocktalk-internal:
        aliases:
          - backend
    restart: unless-stopped

networks:
  # OCI 서버에 외부 네트워크를 미리 생성해 사용한다.
  mocktalk-internal:
    external: true
